services:
  - type: web
    name: lie-detector-app
    env: python
    plan: free
    pythonVersion: 3.9
    buildCommand: cd lie-detector-app/Backend && pip install -r requirements.txt
    startCommand: cd lie-detector-app/Backend && gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
